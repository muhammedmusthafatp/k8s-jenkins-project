apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-app
  namespace: jenkins-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: node-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app
        image: 369602465346.dkr.ecr.ap-south-2.amazonaws.com/k8s-jenkin-repo:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
